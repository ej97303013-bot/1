<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>기압 측정기</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Pretendard', 'Malgun Gothic', sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .app-container {
            background-color: white;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-sizing: border-box;
        }
        h1 {
            color: #333;
            font-size: 22px;
            margin-bottom: 10px;
        }
        p {
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
            line-height: 1.5;
        }
        button {
            width: 100%;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-bottom: 15px;
        }
        button:disabled {
            background-color: #6c757d;
            cursor: not-allowed;
        }
        button:active {
            background-color: #218838;
        }
        #status {
            font-size: 18px;
            font-weight: bold;
            color: #007bff;
            margin-bottom: 20px;
            min-height: 27px;
        }
        .chart-container {
            position: relative;
            height: 300px;
            width: 100%;
        }
        .error-msg {
            color: #dc3545;
            font-size: 13px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <h1>☁️ 스마트폰 기압 측정기</h1>
    <p>시작 버튼을 누르면 10초 동안<br>주변의 기압 변화를 측정합니다.</p>
    
    <button id="startBtn">▶ 10초 측정 시작</button>
    <div id="status">대기 중...</div>
    
    <div class="chart-container">
        <canvas id="pressureChart"></canvas>
    </div>
</div>

<script>
    const startBtn = document.getElementById('startBtn');
    const statusDiv = document.getElementById('status');
    const ctx = document.getElementById('pressureChart').getContext('2d');

    // Chart.js 초기 설정
    let myChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: [], // 시간(초)
            datasets: [{
                label: '기압 (hPa)',
                data: [], // 기압 데이터
                borderColor: '#007bff',
                backgroundColor: 'rgba(0, 123, 255, 0.1)',
                borderWidth: 2,
                pointRadius: 0, // 점 숨기기 (깔끔한 선을 위해)
                fill: true,
                tension: 0.4 // 곡선 부드럽게
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            animation: false, // 실시간 업데이트를 위해 애니메이션 끄기
            scales: {
                x: {
                    title: { display: true, text: '시간 (초)' }
                },
                y: {
                    title: { display: true, text: '기압 (hPa)' }
                    // y축 범위는 데이터에 따라 자동 조절됨
                }
            }
        }
    });

    startBtn.addEventListener('click', async () => {
        // 브라우저 지원 여부 확인
        if (!('Barometer' in window)) {
            statusDiv.innerHTML = '<span class="error-msg">이 기기나 브라우저에서는 기압 센서를 지원하지 않습니다.<br>(안드로이드 크롬을 사용해주세요.)</span>';
            return;
        }

        try {
            // 센서 권한 요청 및 초기화 (1초에 10번 측정 = 10Hz)
            const sensor = new Barometer({ frequency: 10 });
            
            // 데이터 초기화
            let times = [];
            let pressures = [];
            let startTime = Date.now();

            myChart.data.labels = times;
            myChart.data.datasets[0].data = pressures;
            myChart.update();

            // 센서에서 데이터를 읽어올 때마다 실행되는 이벤트
            sensor.addEventListener('reading', () => {
                const elapsed = (Date.now() - startTime) / 1000;
                
                if (elapsed <= 10) {
                    times.push(elapsed.toFixed(1));
                    pressures.push(sensor.pressure); // 기압 데이터 추가 (hPa 단위)
                    
                    // 그래프 실시간 업데이트
                    myChart.update('none'); 
                }
            });

            // 센서 에러 처리
            sensor.addEventListener('error', event => {
                statusDiv.innerHTML = `<span class="error-msg">센서 오류: ${event.error.name}</span>`;
            });

            // 측정 시작
            sensor.start();
            startBtn.disabled = true;
            statusDiv.style.color = '#dc3545'; // 빨간색으로 변경
            statusDiv.innerText = "🔴 측정 중... (10초)";

            // 10초 뒤에 측정 종료
            setTimeout(() => {
                sensor.stop();
                startBtn.disabled = false;
                statusDiv.style.color = '#28a745'; // 초록색으로 변경
                statusDiv.innerText = "✅ 측정 완료!";
            }, 10000);

        } catch (error) {
            statusDiv.innerHTML = `<span class="error-msg">실행 오류: ${error.message}</span>`;
        }
    });
</script>

</body>
</html>
